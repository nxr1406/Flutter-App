name: linkup
description: LinkUp - A modern Flutter Chat Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Image & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI & Animations
  google_fonts: ^6.1.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  lottie: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
